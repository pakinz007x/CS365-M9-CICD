name: Sample App Tests

on: push 

jobs:
  sample_app_tests:
    name: Run Tests Using Jest
    runs-on: ubuntu-latest
    with
    name: "Run Tests — Node ${{ matrix.node }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
    fail-fast: false
    matrix:
    os: [ubuntu-latest, windows-latest]
    node: [18, 20, 22]
    exclude:
    - os: windows-latest
    node: 18